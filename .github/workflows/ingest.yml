name: ingest

# Scheduled live-data ingestion for RagusIA. Runs `pnpm ingest` against the
# database, refreshing each source's data + provenance/health and recording an
# ingest_runs row (with the count-guard). Runs here rather than on Vercel Cron
# because the heavy sources (ANAC ~150 MB, BDAP zip) need real curl + time/memory.
on:
  schedule:
    - cron: "0 4 * * *" # daily at 04:00 UTC
  workflow_dispatch:
    inputs:
      sources:
        description: "Space-separated source ids (empty = all), e.g. 'anac bdap'"
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANAC_YEARS: ${{ vars.ANAC_YEARS || '2024,2025' }}
      # Untrusted input — never interpolate directly into a run script.
      SOURCES_INPUT: ${{ github.event.inputs.sources }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run ingest
        run: |
          # Allowlist: strip everything except lowercase letters, digits, spaces —
          # neutralises any shell-injection in the dispatch input before use.
          SOURCES=$(printf '%s' "$SOURCES_INPUT" | tr -cd 'a-z0-9 ')
          echo "Ingesting sources: ${SOURCES:-<all>}"
          pnpm exec tsx lib/data/ingest/run.ts $SOURCES
